name: Weekly Book Scanner & Auto-Lister

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  scan-and-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Clear unstaged changes
        run: git checkout -- . || true

      - name: Pull latest CSV from repo
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true

      - name: Run scanner
        env:
          BOOKSGOAT_CSV_URL:  ${{ secrets.BOOKSGOAT_CSV_URL }}
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_APP_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CERT_ID }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
        run: python scanner.py

      - name: Run lister
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_APP_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CERT_ID }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
          BOOKSGOAT_CSV_URL:  ${{ secrets.BOOKSGOAT_CSV_URL }}
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python lister.py

      - name: Run repricer
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_APP_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CERT_ID }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
          BOOKSGOAT_CSV_URL:  ${{ secrets.BOOKSGOAT_CSV_URL }}
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python repricer.py

      - name: Send weekly summary
        env:
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:    ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:      ${{ secrets.EMAIL_TO }}
        run: python weekly_summary.py

      - name: Commit updated CSV and state
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add booksgoat_enhanced.csv scan_opportunities.json scanner_log.txt lister_log.txt repricer_log.txt || true
          git pull --rebase origin main || true
          git add booksgoat_enhanced.csv scan_opportunities.json scanner_log.txt lister_log.txt repricer_log.txt || true
          git diff --staged --quiet || git commit -m "Pipeline run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
