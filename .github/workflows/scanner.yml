name: Weekly Book Scanner & Auto-Lister

on:
  schedule:
    - cron: '0 14 * * 1'   # Every Monday at 9 AM EST (14:00 UTC)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  scan-and-list:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run scanner
        env:
          BOOKSGOAT_CSV_URL:  ${{ secrets.BOOKSGOAT_CSV_URL }}
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
        run: python scanner.py

      - name: Run lister
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python lister.py

      - name: Commit updated state
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add lister_state.json scan_opportunities.json scanner_log.txt lister_log.txt || true
          git diff --staged --quiet || git commit -m "Scanner/Lister run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
