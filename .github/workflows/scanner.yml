name: Weekly Book Scanner & Auto-Lister

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  scan-and-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run scanner
        env:
          BOOKSGOAT_CSV_URL:  ${{ secrets.BOOKSGOAT_CSV_URL }}
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_APP_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CERT_ID }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
        run: python scanner.py

      - name: Run lister
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_APP_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CERT_ID }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
          BOOKSGOAT_CSV_URL:  ${{ secrets.BOOKSGOAT_CSV_URL }}
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python lister.py

      - name: Run repricer
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_APP_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CERT_ID }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
          BOOKSGOAT_CSV_URL:  ${{ secrets.BOOKSGOAT_CSV_URL }}
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python repricer.py

      - name: Send weekly summary
        env:
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:    ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:      ${{ secrets.EMAIL_TO }}
        run: python weekly_summary.py'
          import os, smtplib
          from email.mime.text import MIMEText
          from datetime import datetime

          scanner_log  = open('scanner_log.txt').read()[-3000:] if os.path.exists('scanner_log.txt') else 'N/A'
          lister_log   = open('lister_log.txt').read()[-2000:] if os.path.exists('lister_log.txt') else 'N/A'
          repricer_log = open('repricer_log.txt').read()[-3000:] if os.path.exists('repricer_log.txt') else 'N/A'

          body = f"""BooksGoat Weekly Pipeline Summary
          ===================================
          Run date: {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}

          SCANNER
          -------
          {scanner_log}

          LISTER
          ------
          {lister_log}

          REPRICER
          --------
          {repricer_log}
          """

          msg = MIMEText(body)
          msg['Subject'] = f"BooksGoat Weekly Summary - {datetime.utcnow().strftime('%Y-%m-%d')}"
          msg['From'] = os.environ['EMAIL_FROM']
          msg['To']   = os.environ['EMAIL_TO']

          with smtplib.SMTP(os.environ['SMTP_HOST'], int(os.environ['SMTP_PORT'])) as s:
              s.starttls()
              s.login(os.environ['SMTP_USER'], os.environ['SMTP_PASSWORD'])
              s.sendmail(os.environ['EMAIL_FROM'], [os.environ['EMAIL_TO']], msg.as_string())
          print('Weekly summary sent')
          EOF

      - name: Commit updated state
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add lister_state.json scan_opportunities.json scanner_log.txt lister_log.txt repricer_log.txt || true
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add lister_state.json scan_opportunities.json scanner_log.txt lister_log.txt repricer_log.txt || true
          git diff --staged --quiet || git commit -m "Scanner/Lister/Repricer run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

