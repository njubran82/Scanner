name: BooksGoat Tracker

on:
  schedule:
    - cron: "0 13 * * *"  # 9 AM EST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas python-dotenv

      - name: Run tracker
        env:
          EBAY_APP_ID:        ${{ secrets.EBAY_APP_ID }}
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}

          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}

          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:        ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:          ${{ secrets.TWILIO_TO }}

        run: python cloud_tracker.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add lister_state.json
          git commit -m "Update tracker state" || echo "No changes"
          git push
