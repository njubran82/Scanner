name: BooksGoat Tracker

on:
  schedule:
    # Daily at 9:00 AM UTC (5:00 AM EST)
    - cron: "0 9 * * *"
  workflow_dispatch:   # Manual trigger for testing

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-dotenv

      - name: Pull latest state
        run: git pull origin main

      - name: Run tracker and auto-delist
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          PRICE_SPIKE_PCT:    "20.0"
          MIN_PROFIT_FLOOR:   "1.00"
          MAX_SCRAPE_FAILS:   "3"
          LISTER_STATE_PATH:  "lister_state.json"
        run: python cloud_tracker.py

      - name: Commit updated listing state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          STATE=$(cat lister_state.json 2>/dev/null || echo '{}')
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true
          git pull origin main 2>/dev/null || true
          echo "$STATE" > lister_state.json
          git add lister_state.json
          git diff --staged --quiet || git commit -m "chore: tracker state update $(date +'%Y-%m-%d') [skip ci]"
          git push
